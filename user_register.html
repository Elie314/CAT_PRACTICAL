<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Register - SmartEvent</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-blue-600 to-indigo-600 min-h-screen flex items-center
justify-center">
<div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
<h1 class="text-3xl font-bold text-blue-600 text-center mb-4">User Registration</h1>
<p class="text-gray-500 text-center mb-6">Create your account</p>
<form>
<div class="mb-4">
<label class="block text-gray-700 font-semibold mb-2">Full Name</label>
<input type="text" placeholder="Enter your name" class="w-full border p-3 rounded-lg
focus:ring-2 focus:ring-blue-500">
</div>
<div class="mb-4">
<label class="block text-gray-700 font-semibold mb-2">Email</label>
<input type="email" placeholder="Enter your email" class="w-full border p-3 rounded-lg
focus:ring-2 focus:ring-blue-500">
</div>
<div class="mb-6">
<label class="block text-gray-700 font-semibold mb-2">Password</label>
<input type="password" placeholder="Enter password" class="w-full border p-3
rounded-lg focus:ring-2 focus:ring-blue-500">
</div>
<button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg
hover:bg-blue-700">
Register
</button>
</form>
<p class="text-gray-600 mt-6 text-center">
Already have an account?
<a href="user_login.html" class="text-blue-600 font-semibold hover:underline">Login</a>
</p>
</div
