<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login - SmartEvent</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
<div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
<h1 class="text-3xl font-bold text-red-600 text-center mb-4">Admin Login</h1>
<p class="text-gray-500 text-center mb-6">Access the admin dasshboard</p>
<form>
<div class="mb-4">
<label class="block text-gray-700 font-semibold mb-2">Email</label>
<input type="email" placeholder="Enter email" class="w-full border p-3 rounded-lg
focus:ring-2 focus:ring-red-500">
</div>
<div class="mb-6">
<label class="block text-gray-700 font-semibold mb-2">Password</label>
<input type="password" placeholder="Enter password" class="w-full border p-3
rounded-lg focus:ring-2 focus:ring-red-500">
</div>
<button type="submit" class="w-full bg-red-600 text-white py-3 rounded-lg
hover:bg-red-700">
<a href="Admindashboard.html">Login</a>
</button>
</form>
<p class="text-gray-600 mt-6 text-center">
Don't have an admin account?
<a href="admin-register.html" class="text-red-600 font-semibold
hover:underline">Register</a>
</p>
</div>
</body>
</html>
