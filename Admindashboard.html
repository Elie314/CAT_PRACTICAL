<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard - SmartEvent</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
<div class="flex min-h-screen">
<!-- SIDEBAR -->
<aside class="w-64 bg-gray-900 text-white p-6">
<h2 class="text-2xl font-bold text-red-400 mb-10">Admin Panel</h2>
<nav class="space-y-4">
<a href="#dashboard" class="block hover:text-red-400">Dashboard</a>
<a href="#manage-events" class="block hover:text-red-400">Manage Events</a>
<a href="#bookings" class="block hover:text-red-400">Bookings</a>
<a href="#users" class="block hover:text-red-400">Users</a>
<a href="ADMIN.html" class="block hover:text-red-600">Logout</a>
</nav>
</aside>
<!-- MAIN CONTENT -->
<div class="flex-1 p-8">
<!-- DASHBOARD HEADER -->
<section id="dashboard" class="mb-12">
<h1 class="text-3xl font-bold mb-6">Welcome, Admin!</h1>
<div class="grid md:grid-cols-3 gap-6">
<div class="bg-white p-6 rounded-2xl shadow">
<h3 class="text-gray-500">Total Events</h3>
<p class="text-3xl font-bold text-red-600">12</p>
</div>
<div class="bg-white p-6 rounded-2xl shadow">
<h3 class="text-gray-500">Total Bookings</h3>
<p class="text-3xl font-bold text-green-600">245</p>
</div>
<div class="bg-white p-6 rounded-2xl shadow">
<h3 class="text-gray-500">Registered Users</h3>
<p class="text-3xl font-bold text-purple-600">180</p>
</div>
</div>
</section>
